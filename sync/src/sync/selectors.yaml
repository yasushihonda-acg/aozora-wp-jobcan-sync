# Jobcan public-page selectors and parsing config.
#
# This file is the single source of truth for which CSS selectors the parser
# uses, which header labels map to which normalised fields, and which HTML tags
# survive bleach sanitisation. Update this file (and the matching pytest fixtures)
# when Jobcan changes their public markup — no Python edits required.
#
# Codex review (Phase 2A) reflected:
# - Pydantic schema validates this file at load time; bad config raises ConfigError
#   (a separate class from JobcanStructureChangeError, so operators can tell
#    "we shipped a broken config" from "Jobcan changed their HTML")
# - synonyms are explicit lists, not fuzzy match — `給与例` MUST NOT map to `給与`
# - load is once at startup; `--selectors` CLI flag overrides for tests/dev only

version: 1

detail:
  selectors:
    title: ".job-offer-detail-title"
    body: ".job-offer-description-full"
    address: ".job-offer-address"
    label: ".job-offer-label"
    apply_link: 'a[href^="/aozora/entry/new/"]'
    table_lines: ".content-table-line"
    table_header: ".content-table-head, .job-offer-table-left"
    table_body: ".td-contentTable__breakWordWrap, .job-offer-table-right"
  required_table_fields:
    location:
      canonical: "勤務地"
      synonyms:
        - "勤務地"
        - "勤務地・交通"
    salary:
      canonical: "給与"
      synonyms:
        - "給与"
        - "給与（月給）"
        - "給与（時給）"
        - "月給"
        - "時給"

list:
  selectors:
    job_card: ".job-offer-box"
    job_url: 'a[href^="/aozora/job_offers/"]'
    title: ".job-offer-title"
    address: ".job-offer-address"
    label: ".job-offer-label"
    description: ".job-offer-description"
    thumbnail: ".job-offer-main-image-thumbnail"
  # Phase 2A.1c: replace Jobcan-supplied card thumbnails with in-house
  # category illustrations that match the corporate-site (aozora-cg.com)
  # tonal manner. The original Jobcan thumbnail is preserved in
  # `JobListItem.source_thumbnail_url` for operator visibility; the override
  # writes only `JobListItem.thumbnail_url` (display).
  #
  # When `enabled: false`, the override is bypassed and Jobcan's thumbnail
  # is shown as-is — this is the documented escape hatch for the period
  # before Jobcan returns the official inquiry verdict.
  #
  # NOTE on `image` paths (code-review medium #1 — Phase 2A.2 deferred):
  # These are page-relative (`assets/img/...`) and only resolve correctly
  # when the rendered HTML and the assets share a parent. That holds for
  # the Phase A mockup (GH Pages /mockup/) and the CLI `--out` flow.
  # Phase 2A.2 (FastAPI route `/jobs/`) MUST inject a `base_url` template
  # variable so the renderer produces site-root paths (`/assets/img/...`)
  # or proxy `/static/` prefixes — otherwise the production URL
  # `recruit.aozora-cg.com/jobs/...` will 404 on these images.
  thumbnail_categories:
    enabled: true
    categories:
      care:
        synonyms: ["介護職"]
        image: "assets/img/illust-job-care.png"
      nurse:
        synonyms: ["看護師", "相談員"]
        image: "assets/img/illust-job-nurse.png"
      it:
        synonyms: ["ITエンジニア職", "開発エンジニア"]
        image: "assets/img/illust-job-it.png"
      office:
        synonyms: ["事務職"]
        image: "assets/img/illust-job-office.png"
    default_image: "assets/img/illust-job-default.png"

sanitize:
  allowed_tags:
    - "p"
    - "br"
    - "ul"
    - "ol"
    - "li"
    - "strong"
    - "em"
    - "b"
    - "i"
    - "h2"
    - "h3"
    - "h4"
  drop_tags:
    - "script"
    - "style"
    - "form"
    - "iframe"
    - "object"
    - "embed"
